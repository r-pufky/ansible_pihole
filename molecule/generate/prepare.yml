---
- name: 'Prepare'
  hosts: 127.0.0.1
  connection: local
  gather_facts: false
  tasks:
    - name: 'Prepare | import role variables'
      ansible.builtin.include_vars:
        file: '{{
            lookup("env", "MOLECULE_PROJECT_DIRECTORY") ~ "/vars/main.yml"
          }}'

    - name: 'Prepare | cache'
      ansible.builtin.include_role:
        name: 'r_pufky.data.test'
        tasks_from: 'create_cache.yml'
      vars:
        test_name: 'Prepare | cache'

    - name:
        '{{ "Prepare | cache | " ~ pihole___app._basic_install | basename }}'
      ansible.builtin.include_role:
        name: 'r_pufky.data.test'
        tasks_from: 'cache_url.yml'
      vars:
        test_name:
          '{{ "Prepare | cache | " ~ pihole___app._basic_install | basename }}'
        test_dest: '{{ pihole___app._basic_install | basename }}'
        test_url: '{{ pihole___app._url }}'
        test_mode: '0640'

    - name: 'Prepare | cache | balloon source'
      ansible.builtin.include_role:
        name: 'r_pufky.data.test'
        tasks_from: 'cache_git.yml'
      vars:
        test_name: 'Prepare | cache | balloon source'
        test_dest: 'balloon'
        test_repo: '{{ pihole___balloon._url }}'

    - name: 'Prepare | cache | cleanup balloon source'
      ansible.builtin.file:
        path: '{{
            lookup("env", "MOLECULE_PROJECT_DIRECTORY") ~
            "/molecule/cache/balloon/" ~ item
          }}'
        state: 'absent'
      loop:
        - '.coveragerc'
        - '.git'
        - '.github'
        - '.gitignore'

- name: 'Prepare'
  hosts: 'all'
  gather_facts: false
  tasks:
    - name: 'Prepare | import role variables'
      ansible.builtin.include_vars:
        file: '{{
            lookup("env", "MOLECULE_PROJECT_DIRECTORY") ~ "/vars/main.yml"
          }}'

    - name: 'Prepare | inject | required testing packages'
      ansible.builtin.apt:
        name: 'rsync'
        state: 'present'

    - name:
        '{{ "Prepare | inject | " ~ pihole___app._basic_install | basename }}'
      ansible.builtin.copy:
        src: '{{
            lookup("env", "MOLECULE_PROJECT_DIRECTORY") ~ "/molecule/cache/" ~
            pihole___app._basic_install | basename
          }}'
        dest: '{{ pihole___app._basic_install }}'
        owner: 'root'
        group: 'root'
        mode: '0755'

    - name: 'Prepare | inject | balloon source'
      ansible.posix.synchronize:
        src: '{{
            lookup("env", "MOLECULE_PROJECT_DIRECTORY") ~
            "/molecule/cache/balloon/"
          }}'
        dest: '/opt/balloon-hashing'
        delete: true
        recursive: true
        archive: false
        checksum: true
