---
###############################################################################
# Generate
###############################################################################
# Generate creates hashes successfully and exits role.
#
# Tests:
# * totp_secret, pwhash, app_pwhash are generated.
# * Role exits.

dependency:
  name: 'galaxy'
driver:
  name: 'podman'
provisioner:
  name: 'ansible'
  config_options:
    defaults:
      interpreter_python: 'auto_silent'
      callback_whitelist: 'profile_tasks, timer, yaml'
    ssh_connection:
      pipelining: false
  inventory:
    group_vars:
      all:
        pihole_flg_generate: true
        molecule_flg_inject: true
        pihole_cfg_pwhash: 'test'
        pihole_cfg_app_pwhash: 'test2'
platforms:
  - name: 'pihole-generate'
    image: 'ghcr.io/hifis-net/debian-systemd:13'
    systemd: 'always'
    volumes:
      - '/sys/fs/cgroup:/sys/fs/cgroup:ro'
    command: '/lib/systemd/systemd'
    pre_build_image: true
verifier:
  name: 'ansible'
scenario:
  test_sequence:
    - 'destroy'
    - 'syntax'
    - 'create'
    - 'prepare'
    - 'converge'
    - 'verify'
    - 'destroy'
