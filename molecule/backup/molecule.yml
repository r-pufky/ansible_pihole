---
###############################################################################
# Backup
###############################################################################
# Pre/Post backup configurations are made and copied correctly. An initial
# PiHole install is made during prepare; as ALL backups are disabled on first
# install.
#
# Tests:
# * Pre-backup is made and copied.
# * Post-backup is made and copied.

dependency:
  name: 'galaxy'
driver:
  name: 'podman'
provisioner:
  name: 'ansible'
  config_options:
    defaults:
      interpreter_python: 'auto_silent'
      callback_whitelist: 'profile_tasks, timer, yaml'
    ssh_connection:
      pipelining: false
  inventory:
    group_vars:
      all:
        molecule_flg_inject: true
        pihole_flg_pre_backup: true
        pihole_flg_post_backup: true
        pihole_flg_api: true
        pihole_srv_restart: true
        pihole_srv_cfg: '{{
            lookup("env", "MOLECULE_PROJECT_DIRECTORY") ~
            "/molecule/files/pihole.toml.api"
          }}'
        pihole_cfg_backup: '/tmp/ansible_pihole_test'
        pihole_cfg_app_pwhash: 'test2'
platforms:
  - name: 'pihole-backup'
    image: 'ghcr.io/hifis-net/debian-systemd:13'
    systemd: 'always'
    volumes:
      - '/sys/fs/cgroup:/sys/fs/cgroup:ro'
    command: '/lib/systemd/systemd'
    pre_build_image: true
verifier:
  name: 'ansible'
scenario:
  test_sequence:
    - 'destroy'
    - 'syntax'
    - 'create'
    - 'prepare'
    - 'converge'
    - 'verify'
    - 'destroy'
