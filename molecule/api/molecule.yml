---
###############################################################################
# API
###############################################################################
# Test all supported REST API interactions.
#
# First apply role with all group management options defined; then run role
# again on top of this state to check group management deletions, insertions,
# and modifications.
#
# Tests:
# * Group management works correctly (new, deleted, updated groups).

dependency:
  name: 'galaxy'
driver:
  name: 'podman'
provisioner:
  name: 'ansible'
  config_options:
    defaults:
      interpreter_python: 'auto_silent'
      callback_whitelist: 'profile_tasks, timer, yaml'
    ssh_connection:
      pipelining: false
  inventory:
    group_vars:
      all:
        molecule_flg_inject: true
        pihole_flg_api: true
        pihole_srv_restart: true
        pihole_srv_cfg: '{{
            lookup("env", "MOLECULE_PROJECT_DIRECTORY") ~
            "/molecule/files/pihole.toml.api"
          }}'
        pihole_cfg_app_pwhash: 'test2'
platforms:
  - name: 'pihole-api'
    image: 'ghcr.io/hifis-net/debian-systemd:13'
    systemd: 'always'
    volumes:
      - '/sys/fs/cgroup:/sys/fs/cgroup:ro'
    command: '/lib/systemd/systemd'
    pre_build_image: true
verifier:
  name: 'ansible'
scenario:
  test_sequence:
    - 'destroy'
    - 'syntax'
    - 'create'
    - 'prepare'
    - 'converge'
    - 'verify'
    - 'destroy'
